<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Zodiac — Mandarin Zest</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --orange:#f37a48;--orange-dark:#d95f2c;--orange-light:#f8dacd;
    --green:#228b22;--green-dark:#1a6b1a;--green-light:#e0f4e0;
    --white:#ffffff;--ink:#1c1c1c;--ink-mid:#555555;--ink-light:#999999;
    --surface:#fdfcfa;--border:#ecddd5;
    --gold:#c9960c;--gold-light:#fef6e0;
  }
  body{font-family:'Outfit',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0}

  /* TOPBAR */
  .topbar{width:100%;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:16px 2rem}
  .logo-text{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-0.01em}
  .logo-text span{color:var(--orange)}

  .app{width:100%;max-width:600px;padding:2.5rem 1.25rem 4rem}

  /* HERO */
  .hero{text-align:center;margin-bottom:2.5rem}
  .hero-chars{font-family:'Noto Serif SC',serif;font-size:48px;font-weight:700;letter-spacing:0.08em;margin-bottom:1.25rem;line-height:1}
  .hero-chars .c1{color:var(--orange)}
  .hero-chars .c2{color:var(--green)}
  .hero-chars .c3{color:var(--orange-light);-webkit-text-stroke:1.5px var(--orange)}
  .hero-chars .c4{color:var(--green-light);-webkit-text-stroke:1.5px var(--green)}
  .hero h1{font-size:24px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
  .hero p{font-size:15px;color:var(--ink-mid)}

  /* INPUT CARD */
  .input-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1rem;position:relative;overflow:hidden}
  .input-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--green))}
  .input-card label{display:block;font-size:14px;font-weight:500;color:var(--ink);margin-bottom:10px}
  .date-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
  .select-wrap{position:relative}
  .select-wrap select{width:100%;appearance:none;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 36px 12px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);cursor:pointer;outline:none;transition:border-color 0.15s}
  .select-wrap select:focus{border-color:var(--orange)}
  .select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink-light);pointer-events:none;font-size:13px}
  .calc-btn{width:100%;background:var(--orange);color:white;border:none;border-radius:12px;padding:15px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.15s,transform 0.1s}
  .calc-btn:hover{background:var(--orange-dark);transform:translateY(-1px)}

  /* RESULT */
  .result-screen{display:none}

  /* Zodiac hero card */
  .zodiac-hero{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:2rem;text-align:center;margin-bottom:1rem;position:relative;overflow:hidden}
  .zodiac-hero::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--orange),var(--green))}
  .zodiac-animal-big{font-family:'Noto Serif SC',serif;font-size:90px;line-height:1;margin-bottom:0.5rem;filter:drop-shadow(0 4px 12px rgba(243,122,72,0.15))}
  .zodiac-name-zh{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:700;color:var(--ink);letter-spacing:0.05em;margin-bottom:4px}
  .zodiac-name-pinyin{font-size:18px;color:var(--orange);font-weight:400;letter-spacing:0.08em;margin-bottom:4px}
  .zodiac-name-en{font-size:15px;color:var(--ink-mid);font-weight:500;margin-bottom:1.25rem}
  .tag-row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:0;margin-top:0.25rem}
  .tag{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500}
  .tag-element{background:var(--gold-light);color:var(--gold);border:1px solid #f0d060}
  .tag-year{background:var(--orange-light);color:var(--orange-dark);border:1px solid var(--orange-light)}
  .tag-yin{background:var(--green-light);color:var(--green);border:1px solid #b8ddb8}

  /* Chinese calendar card */
  .cal-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
  .card-title{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:1rem}
  .cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cal-item{background:var(--surface);border-radius:12px;padding:12px 14px}
  .cal-item-label{font-size:11px;color:var(--ink-light);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
  .cal-item-zh{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:2px}
  .cal-item-pinyin{font-size:12px;color:var(--orange);letter-spacing:0.04em;margin-bottom:1px}
  .cal-item-en{font-size:12px;color:var(--ink-mid)}

  /* Info sections */
  .info-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
  .info-body{font-size:14px;color:var(--ink-mid);line-height:1.7}
  .trait-pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:0.75rem}
  .trait-pill{background:var(--orange-light);color:var(--orange-dark);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500}

  /* Compatibility */
  .compat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .compat-card{border-radius:12px;padding:12px}
  .compat-card.good{background:var(--green-light)}
  .compat-card.bad{background:#fdecea}
  .compat-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
  .compat-label.good{color:var(--green)}
  .compat-label.bad{color:#c0392b}
  .compat-signs{display:flex;flex-direction:column;gap:5px}
  .compat-sign{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
  .compat-sign-emoji{font-size:18px;line-height:1}
  .compat-sign-zh{font-family:'Noto Serif SC',serif;font-weight:600;font-size:14px}
  .compat-sign-info{color:var(--ink-mid);font-size:12px}

  /* Chengyu */
  .chengyu-list{display:flex;flex-direction:column;gap:14px}
  .chengyu-item{border-left:3px solid var(--orange);padding-left:14px}
  .chengyu-zh{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:0.06em;margin-bottom:2px}
  .chengyu-pinyin{font-size:13px;color:var(--orange);letter-spacing:0.06em;margin-bottom:4px}
  .chengyu-meaning{font-size:13px;color:var(--ink-mid);line-height:1.5}
  .chengyu-relevance{font-size:12px;color:var(--ink-light);margin-top:3px;font-style:italic}

  /* Famous people */
  .famous-list{display:flex;flex-wrap:wrap;gap:8px}
  .famous-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;color:var(--ink-mid)}

  /* Buttons */
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:0.25rem}
  .restart-btn{background:var(--white);color:var(--ink);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s}
  .restart-btn:hover{background:var(--orange-light)}
  .share-btn{background:var(--green);color:white;border:none;border-radius:12px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s}
  .share-btn:hover{background:var(--green-dark)}

  @keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .anim{animation:fadeSlide 0.35s ease forwards}
  .anim-2{animation:fadeSlide 0.35s 0.1s ease both}
  .anim-3{animation:fadeSlide 0.35s 0.2s ease both}
  .anim-4{animation:fadeSlide 0.35s 0.3s ease both}
  .anim-5{animation:fadeSlide 0.35s 0.4s ease both}
  .anim-6{animation:fadeSlide 0.35s 0.5s ease both}
  .anim-7{animation:fadeSlide 0.35s 0.6s ease both}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-text">Mandarin <span>Zest</span></div>
</div>

  <!-- HERO -->

  <!-- INPUT -->
  <div id="inputScreen">
    <div class="input-card">
      <label>Enter your date of birth</label>
      <div class="date-row">
        <div class="select-wrap">
          <select id="selDay"></select>
        </div>
        <div class="select-wrap">
          <select id="selMonth">
            <option value="1">January</option><option value="2">February</option>
            <option value="3">March</option><option value="4">April</option>
            <option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option>
            <option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>

        </div>
        <div class="select-wrap">
          <select id="selYear"></select>
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()">Reveal my zodiac →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-screen" id="resultScreen">

    <div class="zodiac-hero anim">

      <div class="zodiac-name-zh" id="rZh"></div>

        <div class="tag tag-yin" id="rYinYang"></div>

    </div>

    <!-- Chinese calendar -->

      <div class="card-title">Your date in the Chinese calendar</div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Personality -->
    <div class="info-card anim-3">
      <div class="card-title">Personality &amp; symbolism</div>
      <div class="info-body" id="rPersonality"></div>
      <div class="trait-pills" id="rTraits"></div>
    </div>

    <!-- Compatibility -->
    <div class="info-card anim-4">
      <div class="card-title">Compatibility</div>
      <div class="compat-grid" id="rCompat"></div>
    </div>

    <!-- Chengyu -->
    <div class="info-card anim-5">
      <div class="card-title">成语 &amp; expressions for your sign</div>
      <div class="chengyu-list" id="rChengyu"></div>
    </div>

    <!-- Famous people -->
    <div class="info-card anim-6">
      <div class="card-title">Famous people born in the year of your sign</div>
      <div class="famous-list" id="rFamous"></div>
    </div>

    <div class="btn-row anim-7">
      <button class="restart-btn" onclick="restart()">← Try another date</button>
      <button class="share-btn" onclick="shareResult()">Share my sign</button>
    </div>

  </div>
</div>

// Anchored to 1924 = 甲 (Wood)
function getElement(chineseYear) {
  const stemIdx = ((chineseYear - 1924) % 10 + 10) % 10;
  return ['Wood','Wood','Fire','Fire','Earth','Earth','Metal','Metal','Water','Water'][stemIdx];
}

function getCNY(year) {
  const d = CNY[year];
  if (!d) return null;
  return new Date(year, d[0]-1, d[1]);
}

function getLunarInfo(date) {
  const year = date.getFullYear();
  const cny = getCNY(year);
  const prevCny = getCNY(year - 1);

  // Determine Chinese year
  let chineseYear, dayOfYear;
  if (cny && date >= cny) {
    chineseYear = year;
    dayOfYear = Math.floor((date - cny) / 86400000) + 1;
  } else if (prevCny) {
    chineseYear = year - 1;
    dayOfYear = Math.floor((date - prevCny) / 86400000) + 1;
  } else {
    chineseYear = year;
    dayOfYear = 1;
  }

  // Heavenly stems (天干) — anchored to 1924 = 甲
  const stems    = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const stemsPy  = ['Jiǎ','Yǐ','Bǐng','Dīng','Wù','Jǐ','Gēng','Xīn','Rén','Guǐ'];
  const stemsEn  = ['Wood Yang','Wood Yin','Fire Yang','Fire Yin','Earth Yang','Earth Yin','Metal Yang','Metal Yin','Water Yang','Water Yin'];

  // Earthly branches (地支) — anchored to 1924 = 子
  const branches   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const branchesPy = ['Zǐ','Chǒu','Yín','Mǎo','Chén','Sì','Wǔ','Wèi','Shēn','Yǒu','Xū','Hài'];

  const offset   = chineseYear - 1924;
  const stemIdx  = ((offset % 10) + 10) % 10;
  const branchIdx= ((offset % 12) + 12) % 12;

  // Approximate lunar month (每月约29.5天)
  const lunarMonth = Math.min(12, Math.floor((dayOfYear - 1) / 29.5) + 1);
  const lunarDay = Math.max(1, Math.round(((dayOfYear - 1) % 29.5) + 1));

  const monthNames = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const monthPy = ['Zhēngyuè','Èryuè','Sānyuè','Sìyuè','Wǔyuè','Liùyuè','Qīyuè','Bāyuè','Jiǔyuè','Shíyuè','Shíyīyuè','Shíèryuè'];
  const dayNums = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  const dayNumsPy = ['Chūyī','Chūèr','Chūsān','Chūsì','Chūwǔ','Chūliù','Chūqī','Chūbā','Chūjiǔ','Chūshí','Shíyī','Shíèr','Shísān','Shísì','Shíwǔ','Shíliù','Shíqī','Shíbā','Shíjiǔ','Èrshí','Niànyī','Niànèr','Niànsān','Niànsì','Niànwǔ','Niànliù','Niànqī','Niànbā','Niànjiǔ','Sānshí'];

  return {
    chineseYear,
    stem: stems[stemIdx], stemPy: stemsPy[stemIdx], stemEn: stemsEn[stemIdx],
    branch: branches[branchIdx], branchPy: branchesPy[branchIdx],
    month: monthNames[lunarMonth-1], monthPy: monthPy[lunarMonth-1],
    day: dayNums[Math.min(lunarDay-1, 29)], dayPy: dayNumsPy[Math.min(lunarDay-1, 29)],
    lunarMonth, lunarDay,
  };
}

function getZodiac(date) {
  const year = date.getFullYear();
  const cny = getCNY(year);
  const chineseYear = (cny && date >= cny) ? year : year - 1;
  const zodiacIdx = ((chineseYear - 4) % 12 + 12) % 12;
  return { sign: ZODIAC[zodiacIdx], chineseYear };
}

function calculate() {

  if (isNaN(date.getTime())) { alert('Please enter a valid date.'); return; }

  const { sign, chineseYear } = getZodiac(date);
  const lunar = getLunarInfo(date);
  const element = getElement(chineseYear);
  const elZh = ELEMENT_ZH[element];

  const s = window._shareSign;
  if (!s) return;
  const text = `I was born in the Year of the ${s.name} (${s.zh} · ${s.py}) — ${s.element} element, ${s.year}. Discover your Chinese zodiac at MandarinZest.com 🐉`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn');
      btn.textContent = 'Copied! ✓';
      setTimeout(() => btn.textContent = 'Share my sign', 2000);
    });
  }
}
</script>
</body>
</html>
